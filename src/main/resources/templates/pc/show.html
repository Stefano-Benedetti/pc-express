<!DOCTYPE html>
<html lang="it" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/favicon.png" />
    <title>PC Express</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pc_show.css">
</head>

<body>

<header>

    <div class="logo">
        PC Express
    </div>

    <nav class="nav_header">
        <a href="/" class="nav_links">Home</a>
        <a href="/pc/catalog" class="nav_links">Catalogo</a>
        <a href="/user/cart" class="nav_links">Carrello</a>
        <a href="/sale/user_sales" class="nav_links">I miei acquisti</a>
        <a href="/user/personal_area" class="nav_links">Area Personale</a>

        <a href="/register"
           class="nav_links"
           sec:authorize="isAnonymous()">
            Registrati
        </a>

        <a href="/login"
           class="nav_links"
           sec:authorize="isAnonymous()">
            Accedi
        </a>

        <span class="logout nav_links"
              sec:authorize="isAuthenticated()">

            <form th:action="@{/logout}" method="post">
                <button type="submit">Logout</button>
            </form>

        </span>

    </nav>

</header>

<main class="container">

    <div class="breadcrumb">
        <a href="/">Home</a> >
        <a href="/pc/catalog">Catalogo</a> >
        <span th:text="${pc.nome}"></span>
    </div>

    <section class="product">

        <div class="product-image">
            <img th:src="@{/pc/image/{id}(id=${pc.id})}" alt="PC">
        </div>

        <div class="product-info">

            <h1 th:text="${pc.nome}"></h1>

            <p class="price"
               th:text="${#numbers.formatDecimal(pc.prezzo, 1, 2) + ' €'}">
            </p>

            <p class="stock">
                Disponibili:
                <span th:text="${pc.disponibilita}"></span>
            </p>

            <form th:action="@{/user/cart/add}" method="post">

                <input type="hidden" name="pcId" th:value="${pc.id}">

                <label for="quantity">Quantità</label>

                <input type="number" id="quantity" name="quantity" min="1" value="1" th:attr="max=${pc.disponibilita}">

                <button type="submit" class="cartButton" th:formaction="@{/user/cart/add}">
                    Aggiungi al carrello
                </button>

                <button type="submit" class="buyButton" th:formaction="@{/sale/single_item/makeNewSale}">
                    Acquista subito
                </button>

            </form>

        </div>

    </section>

    <section class="specs">

        <h2>Specifiche Tecniche</h2>

        <table>

            <tr>
                <td>CPU</td>
                <td th:text="${pc.cpu}"></td>
            </tr>

            <tr>
                <td>GPU</td>
                <td th:text="${pc.gpu}"></td>
            </tr>

            <tr>
                <td>RAM</td>
                <td th:text="${pc.ram}"></td>
            </tr>

            <tr>
                <td>SSD</td>
                <td th:text="${pc.rom}"></td>
            </tr>

            <tr>
                <td>Case</td>
                <td th:text="${pc.casePc}"></td>
            </tr>

            <tr>
                <td>Codice</td>
                <td th:text="${pc.codice}"></td>
            </tr>

        </table>

    </section>

</main>

<footer>

    <p>PC Express - Il tuo negozio di PC preassemblati.</p>

    <div class="admin" sec:authorize="hasAuthority('ADMIN')">
        <a href="/admin/users/all_users">Utenti</a>
        <a href="/admin/sale/all_sales">Vendite</a>
        <a href="/admin/pc/newpc_form">Nuovo PC</a>
        <a th:href="|/admin/pc/${pc.id}/modify|">Modifica PC</a>
        <a th:href="|/admin/pc/${pc.id}/clone|">Clona PC</a>
    </div>

</footer>

</body>
</html>
