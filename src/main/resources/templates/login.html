<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Express</title>
    <link rel="icon" href="/images/favicon.png" />
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
<div class="login-container">
    <div class="login-card">

        <h2>Accedi a PC Express</h2>
        <p class="subtitle">
            Inserisci le tue credenziali per continuare
        </p>

        <div class="error" th:if="${param.error}">
            ❌ Credenziali errate
        </div>

        <form th:action="@{/login}" method="post" class="login-form">

            <div class="form-group">
                <label for="username">Email</label>
                <input type="text" id="username" name="username" placeholder="Inserisci la tua email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Inserisci la password">
            </div>

            <button type="submit" class="btn-login">
                Accedi
            </button>

        </form>

        <div class="register-link">
            Non hai un account?
            <a href="/register_form">Registrati</a>
        </div>

    </div>
</div>
</body>
</html>
