<!DOCTYPE html>
<html lang="it" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clona PC - PC Express</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/pc_form.css}">
</head>

<body>

<header>
    <div class="logo">PC Express</div>

    <nav class="nav_header">
        <a href="/pc/catalog" class="nav_links">Catalogo</a>
        <a href="/admin/pc/newpc_form" class="nav_links">Nuovo PC</a>
        <a href="/admin/users/all_users" class="nav_links" sec:authorize="hasAuthority('ADMIN')">Admin</a>
    </nav>
</header>

<main class="page-container">

    <div class="form-card">

        <h1>Clona PC</h1>
        <p class="subtitle">Modifica i dati del PC prima di creare la copia</p>

        <form th:action="@{/admin/pc/clone}" method="POST" th:object="${pc}" enctype="multipart/form-data">

            <!-- ID nascosto -->
            <input type="hidden" th:field="*{id}"/>

            <!-- IMMAGINE ATTUALE -->
            <div class="form-group full">
                <label>Immagine del PC</label>

                <div class="img-preview">
                    <img th:src="@{/pc/image/{id}(id=${pc.id})}"
                         alt="PC image">
                </div>
            </div>

            <div class="error-box" th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">...</p>
            </div>
            <div class="form-grid">

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}">
                    <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="${pc.nome}"></span>
                </div>

                <div class="form-group">
                    <label>Prezzo</label>
                    <input type="text" th:field="*{prezzo}">
                    <span class="error" th:if="${#fields.hasErrors('prezzo')}" th:errors="${pc.prezzo}"></span>
                </div>

                <div class="form-group">
                    <label>Disponibilità</label>
                    <input type="text" th:field="*{disponibilita}">
                    <span class="error" th:if="${#fields.hasErrors('disponibilita')}" th:errors="${pc.disponibilita}"></span>
                </div>

                <div class="form-group">
                    <label>Codice prodotto</label>
                    <input type="text" th:field="*{codice}">
                    <span class="error" th:if="${#fields.hasErrors('codice')}" th:errors="${pc.codice}"></span>
                </div>

                <div class="form-group">
                    <label>CPU</label>
                    <input type="text" th:field="*{cpu}">
                    <span class="error" th:if="${#fields.hasErrors('cpu')}" th:errors="${pc.cpu}"></span>
                </div>

                <div class="form-group">
                    <label>GPU</label>
                    <input type="text" th:field="*{gpu}">
                    <span class="error" th:if="${#fields.hasErrors('gpu')}" th:errors="${pc.gpu}"></span>
                </div>

                <div class="form-group">
                    <label>RAM</label>
                    <input type="text" th:field="*{ram}">
                    <span class="error" th:if="${#fields.hasErrors('ram')}" th:errors="${pc.ram}"></span>
                </div>

                <div class="form-group">
                    <label>ROM</label>
                    <input type="text" th:field="*{rom}">
                    <span class="error" th:if="${#fields.hasErrors('rom')}" th:errors="${pc.rom}"></span>
                </div>

                <div class="form-group">
                    <label>Case</label>
                    <input type="text" th:field="*{casePc}">
                    <span class="error" th:if="${#fields.hasErrors('casePc')}" th:errors="${pc.casePc}"></span>
                </div>

                <!-- NUOVA IMMAGINE -->
                <div class="form-group full">
                    <label>Modifica immagine (opzionale)</label>
                    <input type="file" name="image" accept="image/*">
                    <small>Lascia vuoto per mantenere l’immagine attuale</small>
                </div>

            </div>

            <!-- CHECKBOX -->
            <div class="form-group full checkbox-group">
                <label>
                    <input type="checkbox" name="toZero">
                    Porta a zero la disponibilità di questo PC
                </label>
            </div>

            <button type="submit" class="submit-btn">
                Clona PC
            </button>

        </form>

    </div>

</main>

<footer>
    <p>PC Express - Admin panel</p>
</footer>

</body>
</html>
