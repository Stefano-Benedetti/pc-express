<!DOCTYPE html>
<html lang="it" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aggiungi PC - PC Express</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/pc_form.css}">
</head>

<body>

<header>
  <div class="logo">PC Express</div>

  <nav class="nav_header">
    <a href="/pc/catalog" class="nav_links">Catalogo</a>
    <a href="/admin/pc/newpc_form" class="nav_links">Nuovo PC</a>
    <a href="/admin/users/all_users" class="nav_links" sec:authorize="hasAuthority('ADMIN')">Admin</a>
  </nav>
</header>

<main class="page-container">

  <div class="form-card">

    <h1>Aggiungi un nuovo PC</h1>
    <p class="subtitle">Compila i dati del nuovo computer da inserire nel catalogo</p>

    <form th:action="@{/admin/pc/newpc_form}" method="POST" th:object="${pc}" enctype="multipart/form-data">  <!--enctype è per le immagini-->

      <!-- ERRORI GLOBALI -->
      <div class="error-box" th:if="${#fields.hasGlobalErrors()}">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
      </div>

      <div class="form-grid">

        <div class="form-group full">
          <label>Nome</label>
          <input type="text" th:field="*{nome}">
          <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div class="form-group">
          <label>Prezzo</label>
          <input type="text" th:field="*{prezzo}">
          <span class="error" th:if="${#fields.hasErrors('prezzo')}" th:errors="*{prezzo}"></span>
        </div>

        <div class="form-group">
          <label>Disponibilità</label>
          <input type="text" th:field="*{disponibilita}">
          <span class="error" th:if="${#fields.hasErrors('disponibilita')}" th:errors="*{disponibilita}"></span>
        </div>

        <div class="form-group">
          <label>Codice prodotto</label>
          <input type="text" th:field="*{codice}">
          <span class="error" th:if="${#fields.hasErrors('codice')}" th:errors="*{codice}"></span>
        </div>

        <div class="form-group">
          <label>CPU</label>
          <input type="text" th:field="*{cpu}">
          <span class="error" th:if="${#fields.hasErrors('cpu')}" th:errors="*{cpu}"></span>
        </div>

        <div class="form-group">
          <label>GPU</label>
          <input type="text" th:field="*{gpu}">
          <span class="error" th:if="${#fields.hasErrors('gpu')}" th:errors="*{gpu}"></span>
        </div>

        <div class="form-group">
          <label>RAM</label>
          <input type="text" th:field="*{ram}">
          <span class="error" th:if="${#fields.hasErrors('ram')}" th:errors="*{ram}"></span>
        </div>

        <div class="form-group">
          <label>ROM</label>
          <input type="text" th:field="*{rom}">
          <span class="error" th:if="${#fields.hasErrors('rom')}" th:errors="*{rom}"></span>
        </div>

        <div class="form-group">
          <label>Case</label>
          <input type="text" th:field="*{casePc}">
          <span class="error" th:if="${#fields.hasErrors('casePc')}" th:errors="*{casePc}"></span>
        </div>

        <!-- IMMAGINE -->
        <div class="form-group full">
          <label>Immagine del PC</label>
          <input type="file" name="image" accept="image/*">
        </div>

      </div>

      <button type="submit" class="submit-btn">
        Salva PC
      </button>
    </form>

  </div>

</main>

<footer>
  <p>PC Express - Admin panel</p>
</footer>

</body>
</html>
