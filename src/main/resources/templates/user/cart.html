<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PC Express</title>
</head>
<body>
  <h1>Carrello</h1>
  <div th:if="${cart.getCartItems().isEmpty()}">Non ci sono computer nel carrello.</div>
  <ul>
    <li th:each="cartItem : ${cart.getCartItems()}">
      <a th:href="|/pc/${cartItem.getPc().getId()}|"
         th:text="|${cartItem.getPc().getNome()}|">nome</a>
    </li>
  </ul>
</body>
</html>
