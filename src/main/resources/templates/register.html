<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/favicon.png" />
  <title>PC Express</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/register.css}">
</head>

<body>
<div class="register-container">

  <div class="register-card">

    <h2>Crea il tuo account</h2>

    <p class="subtitle">
      Registrati su PC Express per iniziare
    </p>

    <form th:action="@{/register}" method="post" th:object="${form}" class="register-form">

      <div class="error-box" th:if="${#fields.hasGlobalErrors()}">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
      </div>

      <div class="form-row">
        <label>Nome</label>
        <input type="text" th:field="*{firstName}">
        <div class="error" th:errors="*{firstName}"></div>
      </div>

      <div class="form-row">
        <label>Cognome</label>
        <input type="text" th:field="*{lastName}">
        <div class="error" th:errors="*{lastName}"></div>
      </div>

      <div class="form-row">
        <label>Email</label>
        <input type="email" th:field="*{email}">
        <div class="error" th:errors="*{email}"></div>
      </div>

      <div class="form-row">
        <label>Data di nascita</label>
        <input type="date" th:field="*{dateOfBirth}">
        <div class="error" th:errors="*{dateOfBirth}"></div>
      </div>

      <div class="form-row">
        <label>Telefono</label>
        <input type="text" th:field="*{phoneNumber}">
        <div class="error" th:errors="*{phoneNumber}"></div>
      </div>

      <div class="form-row">
        <label>Password</label>
        <input type="password" th:field="*{password}">
        <div class="error" th:errors="*{password}"></div>
      </div>

      <button type="submit" class="btn-register">
        Registrati
      </button>

    </form>

    <div class="login-link">
      Hai già un account?
      <a th:href="@{/login}">Accedi</a>
    </div>

  </div>

</div>
</body>
</html>
