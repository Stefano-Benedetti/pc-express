<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>PC Express</title>
</head>
<body>
<div>
  <h2>Registrazione</h2>

  <form th:action="@{/register}" method="post" th:object="${form}">
    <div th:if="${#fields.hasGlobalErrors()}">
      <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">...</p>
    </div>
    <div>
      <label>Nome:</label>
      <span><input type="text" th:field="${form.firstName}"></span>
      <span th:if="${#fields.hasErrors('firstName')}" th:errors="${form.firstName}"></span>
    </div>
    <div>
      <label>Cognome:</label>
      <span><input type="text" th:field="${form.lastName}"></span>
      <span th:if="${#fields.hasErrors('lastName')}" th:errors="${form.lastName}"></span>
    </div>
    <div>
      <label>Email:</label>
      <span><input type="text" th:field="${form.email}"></span>
      <span th:if="${#fields.hasErrors('email')}" th:errors="${form.email}"></span>
    </div>
    <div>
      <label>Data di nascita:</label>
      <span><input type="date" th:field="${form.dateOfBirth}"></span>
      <span th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="${form.dateOfBirth}"></span>
    </div>
    <div>
      <label>Telefono:</label>
      <span><input type="text" th:field="${form.phoneNumber}"></span>
      <span th:if="${#fields.hasErrors('phoneNumber')}" th:errors="${form.phoneNumber}"></span>
    </div>

    <div>
      <label>Password:</label>
      <span><input type="text" th:field="${form.password}"></span>
      <span th:if="${#fields.hasErrors('password')}" th:errors="${form.password}"></span>
    </div>

    <button type="submit">Conferma</button>

  </form>
</div>
</body>
</html>
